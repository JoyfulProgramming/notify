<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Notify — live feed</title>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.2rem; }
  #status { color: #666; font-size: 0.9rem; }
  ul { list-style: none; padding: 0; }
  li { border: 1px solid #ddd; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; }
  .source { color: #666; font-size: 0.8rem; }
  .title { font-weight: 600; }
</style>
</head>
<body data-signals-status="'connecting…'"
      data-init="@get(`/events?token=${new URLSearchParams(location.search).get('token') || 'local-key'}`)">
<h1>Notify</h1>
<div id="status" data-text="$status"></div>
<ul id="feed"></ul>
</body>
</html>
